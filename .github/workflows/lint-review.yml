name: Lint Review

on:
  workflow_run:
    workflows: ["Lint"]
    types: [completed]

jobs:
  review:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - uses: stbenjam/skillsaw/review@4c8d62e4245ecb321012152e018dd613dcdcc2e7 # v0.13.1
